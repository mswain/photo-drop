# Local/self-hosted stack: Postgres + the Photo Dump app.
# For real deployments, point DATABASE_URL at a managed Postgres and supply
# real AWS credentials + bucket.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: photo
      POSTGRES_PASSWORD: photo
      POSTGRES_DB: photodump
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photo -d photodump"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Inside the compose network the DB host is "db".
      DATABASE_URL: postgres://photo:photo@db:5432/photodump
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in your .env}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      ALLOWED_CONTENT_TYPE_PREFIX: ${ALLOWED_CONTENT_TYPE_PREFIX:-image/}
      PRESIGN_EXPIRY_SECONDS: ${PRESIGN_EXPIRY_SECONDS:-900}

volumes:
  pgdata:
